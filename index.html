<meta charset="UTF-8">

<title>RAGE - Calendario</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0A0A08;--surface:#111110;--surface2:#1A1A18;--border:#2A2A28;--border2:#333330;--gold:#C8A96E;--gold-dim:#8A7048;--sand:#E8E0D0;--sand-dim:#9A9288;--white:#F5F2EC;--green-dim:#2A4A32;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--sand);font-family:'Inter',sans-serif;font-size:14px;min-height:100vh;}
header{border-bottom:1px solid var(--border);padding:0 32px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg);z-index:100;}
.hb{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:18px;letter-spacing:4px;color:var(--gold);text-transform:uppercase;}
.hs{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--sand-dim);letter-spacing:2px;}
.hst{display:flex;gap:24px;align-items:center;}
.stat{text-align:right;}
.sv{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:600;color:var(--gold);line-height:1;}
.sl{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--sand-dim);letter-spacing:1px;text-transform:uppercase;}
main{max-width:1100px;margin:0 auto;padding:32px 24px 80px;}
.week{margin-bottom:48px;}
.wh{display:flex;align-items:baseline;gap:16px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border);}
.wn{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:500;color:var(--gold-dim);letter-spacing:3px;text-transform:uppercase;}
.wt{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:600;color:var(--white);letter-spacing:1px;}
.wd{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--sand-dim);margin-left:8px;}
.wp{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--sand-dim);}
.posts{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.post{background:var(--surface);border:1px solid var(--border);padding:20px;transition:border-color 0.2s;}
.post:hover{border-color:var(--border2);}
.post.done{border-color:var(--green-dim);background:#111A14;}
.post.done .pt{text-decoration:line-through;color:var(--sand-dim);}
.post.opt{border-style:dashed;}
.pd{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.dt{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;padding:3px 8px;border:1px solid;}
.day-seg .dt{color:var(--gold);border-color:var(--gold-dim);}
.day-qua .dt{color:#7EB8C8;border-color:#3A6878;}
.day-sex .dt{color:#B87EC8;border-color:#684A78;}
.day-opt .dt{color:#8AA86E;border-color:#4A6838;}
.pdate{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--sand-dim);letter-spacing:1px;}
.ch{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--sand-dim);letter-spacing:1px;margin-bottom:10px;}
.tagopt{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--gold);letter-spacing:1.5px;margin-bottom:8px;}
.pt{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:600;color:var(--white);line-height:1.3;margin-bottom:6px;letter-spacing:0.5px;}
.ph{font-size:11px;color:var(--gold-dim);font-style:italic;margin-bottom:8px;line-height:1.4;}
.pdesc{font-size:12px;color:var(--sand-dim);line-height:1.6;margin-bottom:16px;}
.db{display:none;font-family:'JetBrains Mono',monospace;font-size:9px;color:#4A9A5A;letter-spacing:2px;margin-bottom:8px;}
.post.done .db{display:block;}
.obs{display:none;font-size:12px;color:var(--sand-dim);font-style:italic;background:var(--surface2);padding:8px 10px;border-left:2px solid var(--gold-dim);margin-bottom:12px;line-height:1.5;}
.post.has-obs .obs{display:block;}
.ficha{display:none;font-size:11.5px;color:var(--sand-dim);line-height:1.6;margin-top:14px;padding-top:14px;border-top:1px solid var(--border);}
.ficha.show{display:block;}
.ficha>div{margin-bottom:7px;}
.ficha b{color:var(--sand);font-weight:600;}
.pa{display:flex;gap:8px;align-items:center;margin-top:14px;flex-wrap:wrap;}
.btn{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;padding:5px 10px;border:1px solid;cursor:pointer;background:transparent;transition:all 0.15s;}
.bdone{color:#4A9A5A;border-color:var(--green-dim);}
.bdone:hover{background:var(--green-dim);color:var(--white);}
.post.done .bdone{color:var(--sand-dim);border-color:var(--border);}
.bedit{color:var(--gold);border-color:var(--gold-dim);}
.bedit:hover{background:var(--gold-dim);color:var(--bg);}
.bficha{color:#7EB8C8;border-color:#3A6878;}
.bficha:hover{background:#3A6878;color:var(--white);}
.bobs{color:var(--sand-dim);border-color:var(--border);}
.bobs:hover{border-color:var(--border2);color:var(--sand);}
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:200;align-items:center;justify-content:center;}
.mo.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border2);width:560px;max-width:95vw;max-height:88vh;overflow-y:auto;padding:32px;}
.obsm{background:var(--surface);border:1px solid var(--border2);width:440px;max-width:95vw;padding:28px;}
.mt{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:24px;}
.field{margin-bottom:16px;}
.fieldrow{display:flex;gap:10px;}
.fieldrow .field{flex:1;min-width:0;}
.field label{display:block;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--sand-dim);margin-bottom:6px;}
.field input,.field textarea,.field select{width:100%;background:var(--surface2);border:1px solid var(--border2);color:var(--sand);font-family:'Inter',sans-serif;font-size:13px;padding:10px 12px;outline:none;transition:border-color 0.15s;}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--gold-dim);}
.field textarea{resize:vertical;min-height:60px;}
.field select option{background:var(--surface2);}
.ma{display:flex;gap:10px;justify-content:flex-end;margin-top:24px;}
.bcancel{color:var(--sand-dim);border-color:var(--border);font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;padding:8px 16px;border:1px solid;cursor:pointer;background:transparent;}
.bsave{color:var(--bg);background:var(--gold);border-color:var(--gold);font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;padding:8px 16px;border:1px solid;cursor:pointer;}
.fb{display:flex;gap:8px;margin-bottom:32px;flex-wrap:wrap;}
.fbtn{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;padding:6px 14px;border:1px solid var(--border);cursor:pointer;background:transparent;color:var(--sand-dim);transition:all 0.15s;}
.fbtn.active,.fbtn:hover{border-color:var(--gold-dim);color:var(--gold);}
.ss{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--sand-dim);letter-spacing:1px;display:flex;align-items:center;gap:8px;}
.dot{width:6px;height:6px;border-radius:50%;background:var(--gold-dim);}
.dot.on{background:#4A9A5A;}
@media(max-width:768px){.posts{grid-template-columns:1fr;}header{padding:0 16px;}main{padding:20px 16px 80px;}.hst{display:none;}.fieldrow{flex-direction:column;gap:0;}}
</style>
</head>

function initD(){
  var raw=localStorage.getItem(LSK);
  if(raw){try{DATA=JSON.parse(raw);return;}catch(e){}}
  DATA=DW.map(function(w){
    return {week:w.week,theme:w.theme,dates:w.dates,posts:w.posts.map(function(p){
      return {id:p.id,day:p.day,d:p.d,ch:p.ch,cat:p.cat,t:p.t,h:p.h,dc:p.dc,obj:p.obj,inte:p.inte,emo:p.emo,ref:p.ref,prod:p.prod,cta:p.cta,tmp:p.tmp,rf:p.rf,rv:p.rv,rl:p.rl,ra:p.ra,re:p.re,leg:p.leg,st:p.st,isOpt:p.isOpt||false,done:false,obs:''};
    })};
  });
}
function saveLS(){localStorage.setItem(LSK,JSON.stringify(DATA));}
function gp(id){for(var i=0;i<DATA.length;i++){for(var j=0;j<DATA[i].posts.length;j++){if(DATA[i].posts[j].id===id)return DATA[i].posts[j];}}return null;}
function setOn(v){document.getElementById('dot').className='dot'+(v?' on':'');document.getElementById('slbl').textContent=v?'sincronizado':'local';}
function mf(p){if(CF==='all')return true;if(CF==='done')return p.done;if(CF==='pending')return!p.done;return p.day===CF;}
var DL={seg:'Segunda',qua:'Quarta',sex:'Sexta',opt:'Ter/Qui/Sab'};

function render(){
  var c=document.getElementById('cal');
  var td=0,tt=0,h='';
  for(var i=0;i<DATA.length;i++){
    var w=DATA[i];
    var vis=w.posts.filter(mf);
    if(!vis.length)continue;
    var wd=0,wtot=0;
    for(var k=0;k<w.posts.length;k++){if(!w.posts[k].isOpt){wtot++;if(w.posts[k].done)wd++;}}
    tt+=wtot;td+=wd;
    h+='<div class="week"><div class="wh"><span class="wn">SEMANA '+w.week+'</span><span class="wt">'+w.theme+'</span><span class="wd">'+w.dates+'</span><span class="wp">'+wd+'/'+wtot+'</span></div><div class="posts">';
    for(var j=0;j<vis.length;j++){
      var p=vis[j];
      h+='<div class="post day-'+p.day+(p.isOpt?' opt':'')+(p.done?' done':'')+(p.obs?' has-obs':'')+'">'+
        '<div class="pd"><span class="dt">'+DL[p.day]+'</span><span class="pdate">'+p.d+'</span></div>'+
        (p.isOpt?'<div class="tagopt">OPORTUNIDADE - NAO OBRIGATORIO</div>':'')+
        '<div class="ch">'+p.ch+' - '+(p.cat||'')+'</div>'+
        (p.done?'<div class="db">CONCLUIDO</div>':'')+
        '<div class="pt">'+p.t+ '</div>'+
         (p.h?'<div class="ph">"'+p.h+'"</div>':'')+
         '<div class="pdesc">'+p.dc+'</div>'+
         (p.obs?'<div class="obs">'+p.obs+'</div>':'')+
         '<div class="ficha" id="fic-'+p.id+'">'+
           '<div><b>Objetivo:</b> '+(p.obj||'-')+'</div>'+
           '<div><b>Intencao:</b> '+(p.inte||'-')+'</div>'+
           '<div><b>Emocao:</b> '+(p.emo||'-')+'</div>'+
           '<div><b>Referencia:</b> '+(p.ref||'-')+'</div>'+
           '<div><b>Produto relacionado:</b> '+(p.prod||'-')+'</div>'+
           '<div><b>CTA:</b> '+(p.cta||'-')+'</div>'+
           '<div><b>Tempo estimado:</b> '+(p.tmp||'-')+'</div>'+
           '<div><b>Recursos - Fotos:</b> '+(p.rf||'-')+'</div>'+
           '<div><b>Recursos - Videos:</b> '+(p.rv||'-')+'</div>'+
           '<div><b>Recursos - Local:</b> '+(p.rl||'-')+'</div>'+
           '<div><b>Recursos - Atleta:</b> '+(p.ra||'-')+'</div>'+
           '<div><b>Recursos - Equipamentos:</b> '+(p.re||'-')+'</div>'+
           '<div><b>Legenda:</b> '+(p.leg||'-')+'</div>'+
           '<div><b>Status:</b> '+(p.st||'-')+'</div>'+
         '</div>'+
         '<div class="pa">'+
         '<button class="btn bdone" onclick="tog(\''+p.id+'\')">'+( p.done?'Desfazer':'Feito')+'</button>'+
         '<button class="btn bficha" onclick="toggleFicha(\'fic-'+p.id+'\')">Ficha</button>'+
         '<button class="btn bedit" onclick="oE(\''+p.id+'\')">Editar</button>'+
         '<button class="btn bobs" onclick="oO(\''+p.id+'\')">Obs.</button>'+
         '</div></div>';
    }
    h+='</div></div>';
  }
  if(!h)h='<div style="text-align:center;padding:60px;color:var(--sand-dim);font-family:monospace;font-size:11px;">NENHUMA PUBLICACAO</div>';
  c.innerHTML=h;
  document.getElementById('sd').textContent=td;
  document.getElementById('st').textContent=tt;
  document.getElementById('sp').textContent=tt>0?Math.round(td/tt*100)+'%':'0%';
}

function toggleFicha(id){var el=document.getElementById(id);if(el)el.classList.toggle('show');}
function tog(id){var p=gp(id);if(!p)return;p.done=!p.done;saveLS();render();sync(id,{done:p.done});}
function oE(id){var p=gp(id);if(!p)return;EID=id;
  document.getElementById('et').value=p.t;
  document.getElementById('eh').value=p.h||'';
  document.getElementById('ed').value=p.dc;
  document.getElementById('ec').value=p.ch;
  document.getElementById('ecat').value=p.cat||'Ensinar';
  document.getElementById('eobj').value=p.obj||'';
  document.getElementById('eint').value=p.inte||'';
  document.getElementById('eemo').value=p.emo||'';
  document.getElementById('eref').value=p.ref||'';
  document.getElementById('eprod').value=p.prod||'';
  document.getElementById('ecta').value=p.cta||'';
  document.getElementById('etmp').value=p.tmp||'';
  document.getElementById('est').value=p.st||'Programado';
  document.getElementById('erf').value=p.rf||'';
  document.getElementById('erv').value=p.rv||'';
  document.getElementById('erl').value=p.rl||'';
  document.getElementById('era').value=p.ra||'';
  document.getElementById('ere').value=p.re||'';
  document.getElementById('eleg').value=p.leg||'';
  document.getElementById('me').classList.add('open');}
function saveE(){var p=gp(EID);if(!p)return;
  p.t=document.getElementById('et').value;
  p.h=document.getElementById('eh').value;
  p.dc=document.getElementById('ed').value;
  p.ch=document.getElementById('ec').value;
  p.cat=document.getElementById('ecat').value;
  p.obj=document.getElementById('eobj').value;
  p.inte=document.getElementById('eint').value;
  p.emo=document.getElementById('eemo').value;
  p.ref=document.getElementById('eref').value;
  p.prod=document.getElementById('eprod').value;
  p.cta=document.getElementById('ecta').value;
  p.tmp=document.getElementById('etmp').value;
  p.st=document.getElementById('est').value;
  p.rf=document.getElementById('erf').value;
  p.rv=document.getElementById('erv').value;
  p.rl=document.getElementById('erl').value;
  p.ra=document.getElementById('era').value;
  p.re=document.getElementById('ere').value;
  p.leg=document.getElementById('eleg').value;
  saveLS();closeM('me');render();
  sync(EID,{title:p.t,hook:p.h,description:p.dc,channel:p.ch,categoria:p.cat,objetivo:p.obj,intencao:p.inte,emocao:p.emo,referencia:p.ref,produto:p.prod,cta:p.cta,tempo:p.tmp,status:p.st,rec_fotos:p.rf,rec_videos:p.rv,rec_local:p.rl,rec_atleta:p.ra,rec_equip:p.re,legenda:p.leg});}
function oO(id){var p=gp(id);if(!p)return;OID=id;document.getElementById('ot').value=p.obs||'';document.getElementById('mo').classList.add('open');}
function saveO(){var p=gp(OID);if(!p)return;p.obs=document.getElementById('ot').value.trim();saveLS();closeM('mo');render();sync(OID,{obs:p.obs});}
function closeM(id){document.getElementById(id).classList.remove('open');}
function setF(f,b){CF=f;var btns=document.querySelectorAll('.fbtn');for(var i=0;i<btns.length;i++)btns[i].classList.remove('active');b.classList.add('active');render();}

function sync(id,fields){
  fields.updated_at=new Date().toISOString();
  fetch(SU+'/rest/v1/'+TB+'?id=eq.'+id,{method:'PATCH',headers:{'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify(fields)}).catch(function(){});
}

function syncAll(){
  fetch(SU+'/rest/v1/'+TB+'?select=id,done,obs&order=week.asc',{headers:{'apikey':SK,'Authorization':'Bearer '+SK}})
    .then(function(r){return r.json();})
    .then(function(rows){
      if(!rows||!rows.length)return;
      var ch=false;
      for(var i=0;i<rows.length;i++){var p=gp(rows[i].id);if(p&&(p.done!==rows[i].done||p.obs!==rows[i].obs)){p.done=rows[i].done;p.obs=rows[i].obs||'';ch=true;}}
      if(ch){saveLS();render();}
      setOn(true);
    }).catch(function(){setOn(false);});
}

var mos=document.querySelectorAll('.mo');
for(var mi=0;mi<mos.length;mi++){
  mos[mi].addEventListener('click',function(e){if(e.target===this)this.classList.remove('open');});
}

initD();
render();
setTimeout(syncAll,800);
</script>
